<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Estantería">
<title>Gestión de Estantería</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#111111;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;color:#e0e0e0;}
#root{height:100dvh;height:100vh;display:flex;flex-direction:column;background:#111111;}

/* HEADER */
#hdr{background:#1e1e1e;color:#fff;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #2a2a2a;}
.hdr-title{font-family:monospace;font-size:12px;letter-spacing:.14em;color:#FFD600;font-weight:700;text-transform:uppercase;}
.hdr-sub{font-size:11px;color:#666;margin-top:2px;}
#hdr-stock{font-size:26px;font-weight:800;color:#FFD600;font-variant-numeric:tabular-nums;line-height:1;}
.gear-btn{background:none;border:none;cursor:pointer;padding:6px;color:#888;display:flex;align-items:center;justify-content:center;}
.gear-btn:hover{color:#FFD600;}
.gear-btn svg{width:22px;height:22px;}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:80px;}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;height:62px;background:#1e1e1e;border-top:1px solid #2a2a2a;display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:100;}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;font-size:9px;color:#555;cursor:pointer;font-family:monospace;letter-spacing:.06em;text-transform:uppercase;padding:0;}
.nt.on{color:#FFD600;}
.nt svg{width:20px;height:20px;stroke-width:1.8;}
.nt.on svg{stroke-width:2.4;}

/* CARDS */
.card{background:#1e1e1e;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #2a2a2a;}
.card-title{font-family:monospace;font-size:10px;letter-spacing:.12em;color:#888;text-transform:uppercase;margin-bottom:12px;}

/* METRICS */
.mets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.met{background:#161616;border-radius:10px;padding:12px 14px;border:1px solid #252525;}
.met-l{font-family:monospace;font-size:9px;letter-spacing:.1em;color:#666;text-transform:uppercase;margin-bottom:4px;}
.met-v{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;color:#FFD600;}

/* FORMS */
.fg{margin-bottom:12px;}
label.fl{font-family:monospace;font-size:10px;letter-spacing:.1em;color:#888;text-transform:uppercase;display:block;margin-bottom:6px;}
input,select{width:100%;height:50px;border:1.5px solid #2a2a2a;border-radius:10px;padding:0 14px;font-size:16px;font-family:inherit;background:#161616;color:#e0e0e0;-webkit-appearance:none;appearance:none;outline:none;direction:ltr;text-align:left;}
input:focus,select:focus{border-color:#FFD600;box-shadow:0 0 0 3px rgba(255,214,0,.1);}
input::placeholder{color:#444;}
textarea{width:100%;border:1.5px solid #2a2a2a;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;background:#161616;color:#e0e0e0;outline:none;resize:none;}
textarea:focus{border-color:#FFD600;}

/* BUTTONS */
.btn{height:50px;border-radius:11px;border:none;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .12s,transform .1s;letter-spacing:.04em;}
.btn:active{opacity:.75;transform:scale(.99);}
.btn-y{background:#FFD600;color:#111111;}
.btn-dk{background:#2a2a2a;color:#e0e0e0;}
.btn-grn{background:#1a3a1a;color:#44ff44;border:1px solid #44ff44;}
.btn-red{background:#3a1a1a;color:#ff4444;border:1px solid #ff4444;}
.btn-sm{height:36px;font-size:12px;border-radius:8px;padding:0 14px;width:auto;letter-spacing:.06em;font-family:monospace;text-transform:uppercase;}

/* PILL */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;font-family:monospace;text-transform:uppercase;}
.pA{background:#1a2a4a;color:#6699ff;border:1px solid #2a4a8a;}
.pB{background:#3a2800;color:#FFD600;border:1px solid #5a4000;}

/* RACK — horizontal layout */
.rack-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}
.rack-floor{display:flex;flex-direction:row;align-items:flex-end;gap:6px;min-width:max-content;padding:8px 2px 4px;}
.rcol-wrap{display:flex;flex-direction:column;align-items:center;}
.rclabel{font-family:monospace;font-size:10px;font-weight:700;color:#FFD600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;text-align:center;}
.rcol{display:flex;flex-direction:column-reverse;gap:4px;}
.rcell{border-radius:8px;padding:6px 8px;border:1.5px solid;width:110px;min-height:70px;display:flex;flex-direction:column;justify-content:space-between;}
.rc-empty{background:#2a2a2a;border-color:#333;}
.rc-partial{background:#4a3800;border-color:#FFD600;}
.rc-full{background:#1a3a1a;border-color:#44ff44;}
.rcid{font-family:monospace;font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em;}
.rcqty{font-size:14px;font-weight:800;color:#e0e0e0;font-variant-numeric:tabular-nums;}
.rcnm{font-size:9px;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.rcbar{height:3px;border-radius:2px;background:#333;margin-top:5px;overflow:hidden;}
.rcbp{height:100%;border-radius:2px;background:#FFD600;}
.rcbf{height:100%;border-radius:2px;background:#44ff44;}

/* STOCK ROWS */
.srow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #252525;}
.srow:last-child{border-bottom:none;}
.sname{flex:1;font-size:14px;font-weight:500;color:#e0e0e0;}
.ssku{font-family:monospace;font-size:10px;color:#666;margin-top:2px;}
.sqty{font-size:18px;font-weight:800;color:#FFD600;font-variant-numeric:tabular-nums;}

/* ASSIGN ROWS */
.arow{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:10px;margin-bottom:6px;}
.ain{background:#1a3a1a;border:1px solid #2a5a2a;}
.aout{background:#3a1a1a;border:1px solid #5a2a2a;}
.awrn{background:#3a2800;border:1px solid #5a4000;}
.apos{font-family:monospace;font-size:17px;font-weight:900;color:#FFD600;}
.aqty{font-size:14px;font-weight:700;color:#e0e0e0;}

/* HISTORY */
.hrow{display:flex;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid #252525;}
.hrow:last-child{border-bottom:none;}
.htag{font-family:monospace;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.06em;}
.htin{background:#1a3a1a;color:#44ff44;}.htout{background:#3a1a1a;color:#ff6666;}
.hinfo{flex:1;}
.hinm{font-size:13px;font-weight:600;color:#e0e0e0;}
.hipos{font-family:monospace;font-size:11px;color:#666;margin-top:1px;}
.hqty{font-size:15px;font-weight:800;color:#FFD600;font-variant-numeric:tabular-nums;}
.hdate{font-size:10px;color:#555;min-width:52px;text-align:right;font-family:monospace;}

/* TABS */
.tabs{display:flex;gap:4px;background:#161616;border-radius:10px;padding:4px;margin-bottom:14px;}
.tab{flex:1;height:36px;border:none;border-radius:8px;font-family:monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:none;color:#555;transition:all .15s;}
.tab.on{background:#FFD600;color:#111;}

/* SEARCH RESULTS */
.res-item{padding:12px 14px;border-radius:10px;background:#161616;border:1px solid #252525;margin-bottom:6px;cursor:pointer;}
.res-item:hover{border-color:#FFD600;}
.res-item.sel{border-color:#FFD600;background:#2a2000;}
.res-nm{font-size:14px;font-weight:600;color:#e0e0e0;}
.res-sku{font-family:monospace;font-size:11px;color:#888;margin-top:2px;}

/* ALERTS */
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:10px;font-weight:500;font-family:monospace;}
.aok{background:#1a3a1a;color:#44ff44;border:1px solid #2a5a2a;}
.aerr{background:#3a1a1a;color:#ff6666;border:1px solid #5a2a2a;}
.awarn{background:#3a2800;color:#FFD600;border:1px solid #5a4000;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#1e1e1e;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid #2a2a2a;}
.modal-title{font-family:monospace;font-size:12px;letter-spacing:.14em;color:#FFD600;font-weight:700;text-transform:uppercase;margin-bottom:16px;}

/* SPINNER */
.spin{width:28px;height:28px;border:2.5px solid #2a2a2a;border-top-color:#FFD600;border-radius:50%;animation:sp .7s linear infinite;margin:40px auto;}
@keyframes sp{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;}
.eico{font-size:48px;margin-bottom:12px;}
.empty p{font-size:15px;color:#666;margin-bottom:6px;}

/* SECTION LABEL */
.sec{font-family:monospace;font-size:10px;font-weight:700;letter-spacing:.1em;color:#555;margin-bottom:8px;text-transform:uppercase;}
.dhr{border:none;border-top:1px solid #252525;margin:14px 0;}

/* OC ITEMS */
.oc-item{border:1px solid #2a2a2a;border-radius:10px;padding:12px;margin-bottom:8px;background:#161616;}
.oc-nm{font-size:14px;font-weight:600;color:#e0e0e0;margin-bottom:2px;}
.oc-sku{font-family:monospace;font-size:10px;color:#888;}
.oc-qty{font-family:monospace;font-size:18px;font-weight:800;color:#FFD600;}
.oc-fmt{display:flex;gap:6px;margin-top:8px;}
.fmt-btn{flex:1;height:36px;border-radius:8px;border:1.5px solid #2a2a2a;background:#161616;color:#888;font-family:monospace;font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer;}
.fmt-btn.on{border-color:#FFD600;color:#FFD600;background:#2a2000;}

/* SALIDA */
.salida-item{border:1px solid #2a2a2a;border-radius:10px;padding:12px;margin-bottom:8px;background:#161616;}
.salida-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.salida-nm{font-size:14px;font-weight:600;color:#e0e0e0;}
.salida-sku{font-family:monospace;font-size:10px;color:#888;margin-top:2px;}
.salida-row{display:flex;gap:8px;margin-top:6px;}
.del-btn{width:32px;height:32px;border-radius:8px;border:none;background:#3a1a1a;color:#ff6666;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* SCAN */
.scan-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;margin-bottom:6px;border:1px solid #2a2a2a;}
.scan-item.done{background:#1a3a1a;border-color:#44ff44;}
.scan-item.pending{background:#161616;}
.scan-check{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.scan-item.done .scan-check{background:#44ff44;color:#111;}
.scan-item.pending .scan-check{background:#2a2a2a;color:#555;}

/* LABEL PRINT */
@media print {
  body * { visibility: hidden; }
  #labels-print, #labels-print * { visibility: visible; }
  #labels-print { position: absolute; top: 0; left: 0; width: 100%; }
  .label-page { page-break-after: always; }
  body { background: white !important; }
}
.labels-grid{display:flex;flex-wrap:wrap;gap:8px;}
.label-card{width:227px;height:113px;border:1px dashed #333;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px;background:#1e1e1e;overflow:hidden;}
.label-name{font-family:monospace;font-size:9px;font-weight:700;text-transform:uppercase;text-align:center;color:#e0e0e0;margin-top:4px;line-height:1.2;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.label-sku{font-family:monospace;font-size:8px;color:#888;margin-top:2px;text-align:center;}
.label-qr{width:70px;height:70px;}

/* SORT BTNS */
.sort-row{display:flex;gap:6px;margin-bottom:10px;}
.sort-btn{height:30px;padding:0 12px;border-radius:6px;border:1px solid #2a2a2a;background:#161616;color:#888;font-family:monospace;font-size:10px;font-weight:700;text-transform:uppercase;cursor:pointer;}
.sort-btn.on{border-color:#FFD600;color:#FFD600;}

/* POS CONFIG */
.pos-cfg-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #252525;}
.pos-cfg-row:last-child{border-bottom:none;}
.pos-cfg-id{font-family:monospace;font-size:13px;font-weight:700;color:#FFD600;min-width:64px;}
.pos-cfg-input{height:38px;flex:1;}

/* INGRESO ASSIGN TABLE */
.assign-tbl{width:100%;border-collapse:collapse;margin-top:6px;}
.assign-tbl th{font-family:monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#555;padding:6px 4px;text-align:left;border-bottom:1px solid #252525;}
.assign-tbl td{padding:8px 4px;border-bottom:1px solid #1e1e1e;font-size:13px;color:#ccc;}
.assign-tbl tr:last-child td{border-bottom:none;}
.assign-tbl input{height:34px;padding:0 8px;font-size:13px;}

/* QR scanner */
#qr-reader{width:100%;max-width:400px;margin:0 auto;}
</style>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div>
      <div class="hdr-title">Estantería</div>
      <div class="hdr-sub" id="hdr-sub">Cargando…</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="hdr-stock">—</div>
      <button class="gear-btn" onclick="openConfig()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nt" data-v="dash" onclick="nav('dash')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Panel
    </button>
    <button class="nt" data-v="rack" onclick="nav('rack')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="3" rx="1"/><rect x="2" y="14" width="20" height="3" rx="1"/><line x1="6" y1="7" x2="6" y2="3"/><line x1="18" y1="7" x2="18" y2="3"/><line x1="6" y1="21" x2="6" y2="17"/><line x1="18" y1="21" x2="18" y2="17"/></svg>
      Rack
    </button>
    <button class="nt" data-v="ingreso" onclick="nav('ingreso')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      Ingresar
    </button>
    <button class="nt" data-v="salida" onclick="nav('salida')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      Salida
    </button>
    <button class="nt" data-v="buscar" onclick="nav('buscar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </button>
    <button class="nt" data-v="hist" onclick="nav('hist')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Historial
    </button>
  </nav>
</div>

<!-- CONFIG MODAL -->
<div id="modal-config" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeConfig()">
  <div class="modal">
    <div class="modal-title">⚙ Configurar Capacidades</div>
    <div id="config-body"></div>
    <div style="margin-top:14px;">
      <button class="btn btn-y" onclick="saveConfig()">Guardar cambios</button>
      <button class="btn btn-dk" style="margin-top:8px;" onclick="closeConfig()">Cancelar</button>
    </div>
  </div>
</div>

<!-- LABELS MODAL -->
<div id="modal-labels" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeLabels()">
  <div class="modal">
    <div class="modal-title">🖨 Etiquetas</div>
    <div style="margin-bottom:12px;display:flex;gap:8px;">
      <button class="btn btn-y" onclick="printLabels()" style="flex:1;">Imprimir</button>
      <button class="btn btn-dk" onclick="closeLabels()" style="flex:1;">Cerrar</button>
    </div>
    <div id="labels-print">
      <div id="labels-body" class="labels-grid"></div>
    </div>
  </div>
</div>

<!-- SCAN MODAL -->
<div id="modal-scan" class="modal-bg" style="display:none;">
  <div class="modal">
    <div class="modal-title">📷 Escanear QR</div>
    <div id="qr-reader"></div>
    <div style="margin-top:12px;">
      <button class="btn btn-dk" onclick="closeScan()">Cerrar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════ STATE ═══════════════
const S = {
  types:[], positions:[], stock:[], hist:[],
  view:'dash', loading:false, msg:null,

  // Ingreso
  inTab:'oc',
  ocNum:'', ocData:null,
  ocPlan:null, // [{item_name,sku,qty,posId,scanned}]
  artQ:'', artTimer:null, artResults:[], artSel:null, artQty:'1', artPosId:'',

  // Buscar
  bQ:'', bSel:null,

  // Salida
  salidaTab:'art', salidaSONum:'',
  salidaItems:[], salidaQ:'', salidaTimer:null, salidaResults:[], salidaOrder:null, salidaSort:'obra',
  salidaScanned:{},

  // Config
  cfgEdits:{},

  // Labels
  labelsData:null,
};

// ═══════════════ API ═══════════════
async function api(method, path, body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(path,opts);
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||'Error del servidor');
  return d;
}

async function loadAll(){
  S.loading=true; render();
  try{
    const d=await api('GET','/api/data');
    S.types=d.types; S.positions=d.positions; S.stock=d.stock; S.hist=d.movements;
  }catch(e){ showMsg('Error de conexión: '+e.message,'err'); }
  S.loading=false; render();
}

function showMsg(text,t='ok'){
  S.msg={text,t}; render();
  setTimeout(()=>{S.msg=null;render();},3500);
}

// ═══════════════ HELPERS ═══════════════
function posUsed(p){return S.stock.filter(s=>s.position_id===p.id).reduce((n,s)=>n+s.quantity,0);}
function posFree(p){return p.capacity-posUsed(p);}
function getQty(pid,tid){return(S.stock.find(s=>s.position_id===pid&&s.plate_type_id===tid)||{}).quantity||0;}
function typeTotal(tid){return S.stock.filter(s=>s.plate_type_id===tid).reduce((n,s)=>n+s.quantity,0);}
function tname(tid){return(S.types.find(t=>t.id===tid)||{}).name||'?';}
function tsku(tid){return(S.types.find(t=>t.id===tid)||{}).sku||'';}
function tfmt(tid){return(S.types.find(t=>t.id===tid)||{}).format||'A';}
function totalStock(){return S.stock.reduce((n,s)=>n+s.quantity,0);}

function autoAssign(typeId, qty, format){
  const fmt = format || tfmt(typeId);
  let rem = qty;
  const assigns=[];
  // 1) same type, fullest with space (sorted desc by used)
  const withType = S.positions
    .filter(p=>p.format===fmt && getQty(p.id,typeId)>0 && posFree(p)>0)
    .sort((a,b)=>getQty(b.id,typeId)-getQty(a.id,typeId));
  for(const p of withType){
    if(rem<=0) break;
    const take=Math.min(rem,posFree(p));
    assigns.push({posId:p.id,qty:take}); rem-=take;
  }
  // 2) first empty of correct format from N1
  if(rem>0){
    const empty=S.positions
      .filter(p=>p.format===fmt && posUsed(p)===0)
      .sort((a,b)=>a.id.localeCompare(b.id));
    for(const p of empty){
      if(rem<=0) break;
      const take=Math.min(rem,p.capacity);
      assigns.push({posId:p.id,qty:take}); rem-=take;
    }
  }
  return {assigns, overflow:rem};
}

function autoWithdraw(typeId, qty){
  let rem=qty;
  const assigns=[];
  const withType=S.positions
    .filter(p=>getQty(p.id,typeId)>0)
    .sort((a,b)=>getQty(a.id,typeId)-getQty(b.id,typeId));
  for(const p of withType){
    if(rem<=0) break;
    const cur=getQty(p.id,typeId);
    const take=Math.min(rem,cur);
    assigns.push({posId:p.id,qty:take,remaining:cur-take});
    rem-=take;
  }
  return {assigns,shortfall:rem};
}

// ═══════════════ NAV ═══════════════
function nav(v){
  S.view=v;
  S.msg=null;
  if(v==='ingreso'){S.ocData=null;S.ocPlan=null;S.artSel=null;S.artResults=[];S.artQ='';S.artPosId='';}

// ═══════════════ RENDER ═══════════════
function render(){
  // header
  document.getElementById('hdr-stock').textContent=S.loading?'…':totalStock();
  const occupied=S.positions.filter(p=>posUsed(p)>0).length;
  document.getElementById('hdr-sub').textContent=`${occupied}/${S.positions.length} posiciones ocupadas`;

  // nav active
  document.querySelectorAll('.nt').forEach(b=>b.classList.toggle('on',b.dataset.v===S.view));

  // content
  const c=document.getElementById('content');
  if(S.loading){c.innerHTML='<div class="spin"></div>';return;}

  let html='';
  if(S.msg){
    const cl=S.msg.t==='ok'?'aok':S.msg.t==='err'?'aerr':'awarn';
    html+=`<div class="alert ${cl}">${esc(S.msg.text)}</div>`;
  }

  if(S.view==='dash') html+=vDash();
  else if(S.view==='rack') html+=vRack();
  else if(S.view==='ingreso') html+=vIngreso();
  else if(S.view==='salida') html+=vSalida();
  else if(S.view==='buscar') html+=vBuscar();
  else if(S.view==='hist') html+=vHist();

  c.innerHTML=html;
  afterRender();
}

function afterRender(){
  if(S.view==='ingreso' && S.inTab==='oc'){
    const oi=document.getElementById('oc-input');
    if(oi && !(S.ocPlan&&S.ocPlan.length)) oi.focus();
  }
  if(S.view==='ingreso' && S.inTab==='art'){
    const ai=document.getElementById('art-input');
    if(ai && !S.artSel) ai.focus();
  }
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  if(S.types.length===0){

// ═══════════════ RACK ═══════════════
function vRack(){
  const cols=['A1','A2','A3','A4','B1','B2','X1'];
  let h=`<div class="rack-wrap"><div class="rack-floor">`;
  for(const col of cols){
    const levels=S.positions.filter(p=>p.column_id===col).sort((a,b)=>(a.level||0)-(b.level||0));
    if(!levels.length) continue;
    h+=`<div class="rcol-wrap"><div class="rclabel">${col}</div><div class="rcol">`;
    for(const p of levels){
      const used=posUsed(p);
      const pct=p.capacity?Math.round(used/p.capacity*100):0;
      const cls=used===0?'rc-empty':pct>=100?'rc-full':'rc-partial';
      const barCls=pct>=100?'rcbf':'rcbp';
      // top item name
      const topStock=S.stock.filter(s=>s.position_id===p.id).sort((a,b)=>b.quantity-a.quantity)[0];
      const nm=topStock?tname(topStock.plate_type_id):'';
      h+=`<div class="rcell ${cls}">
        <div>
          <div class="rcid">${esc(p.id)}</div>
          <div class="rcqty">${used}<span style="font-size:10px;color:#666;font-weight:400">/${p.capacity}</span></div>
          <div class="rcnm">${esc(nm.substring(0,18))}</div>
        </div>
        <div class="rcbar"><div class="${barCls}" style="width:${pct}%"></div></div>
      </div>`;
    }
    h+=`</div></div>`;
  }
  h+=`</div></div>`;
  return h;
}

async function buscarOC(){
  const raw=S.ocNum.trim().replace(/^OC-/i,'').replace(/\D/g,'');
  if(!raw){showMsg('Ingresa un número de OC','err');return;}
  const num=raw.padStart(5,'0');
  showMsg('Buscando…','ok');
  try{
    const d=await api('GET',`/api/zoho-oc?numero=${encodeURIComponent(num)}`);
    S.ocData=d;
    S.ocItems=d.line_items.map(li=>({
      item_name:li.item_name, sku:li.sku,
      quantity:li.quantity,
      include:true,
      qty:li.quantity,
      posId:''
    }));
    S.msg=null; render();
  }catch(e){showMsg(e.message,'err');}
}

function ocScan(idx, expected){
  document.getElementById('modal-scan').style.display='flex';
  setTimeout(()=>{
    qrScanner=new Html5Qrcode('qr-reader');
    qrScanner.start({facingMode:'environment'},{fps:10,qrbox:200},(text)=>{
      if(text===expected||text.includes(expected)){
        S.ocPlan[idx].scanned=true;
        closeScan(); render();
      }
    },(err)=>{}).catch(e=>console.error(e));
  },300);
}

async function confirmOC(){
  if(!S.ocPlan||!S.ocPlan.length){showMsg('Sin artículos para ingresar','err');return;}
  try{
    const labelsData=[];
    // Agrupar por artículo
    const byName={};
    for(const row of S.ocPlan){
      const key=row.sku||row.item_name;
      if(!byName[key]) byName[key]={item_name:row.item_name,sku:row.sku,assigns:[],total:0};
      byName[key].assigns.push({posId:row.posId,qty:row.qty});
      byName[key].total+=row.qty;
    }
    for(const [key,grp] of Object.entries(byName)){
      let t=S.types.find(x=>x.sku===grp.sku||x.name===grp.item_name);
      if(!t){
        t=await api('POST','/api/types',{name:grp.item_name,sku:grp.sku,format:'A'});
        S.types.push(t);
      }
      await api('POST','/api/ingreso',{tid:t.id,assigns:grp.assigns});
      labelsData.push({name:grp.item_name,sku:grp.sku,qty:grp.total});
    }
    S.labelsData=labelsData;
    S.ocData=null; S.ocPlan=null; S.ocNum='';
    await loadAll();
    showMsg('Ingreso registrado','ok');
    openLabels();
  }catch(e){showMsg(e.message,'err');}
}

  S.salidaQ=val;
  if(S.salidaTimer) clearTimeout(S.salidaTimer);
  if(!val||val.length<2){S.salidaResults=[];render();return;}
  S.salidaTimer=setTimeout(async()=>{
    try{
      const d=await api('GET',`/api/zoho-items?q=${encodeURIComponent(val)}`);
      S.salidaResults=d.items||[];
    }catch(e){S.salidaResults=[];}
    render();
  },400);

function addSalidaItem(r){
  if(S.salidaItems.find(x=>x.sku===r.sku)) return;
  // Try to find existing type
  const t=S.types.find(x=>x.sku===r.sku||x.name===r.item_name);
  S.salidaItems.push({...r,type_id:t?t.id:null,qty:1,obra:''});
  S.salidaResults=[];S.salidaQ='';render();
}

function removeSalidaItem(i){S.salidaItems.splice(i,1);render();}

async function generarOrden(){
  const orderLines=[];
  for(const item of S.salidaItems){
    if(!item.qty||item.qty<1) continue;
    let t=item.type_id?S.types.find(x=>x.id===item.type_id):S.types.find(x=>x.sku===item.sku||x.name===item.item_name);
    if(!t){showMsg(`${item.item_name} no tiene stock registrado`,'err');return;}
    const total=typeTotal(t.id);
    if(total<item.qty){showMsg(`Stock insuficiente para ${item.item_name} (${total} disponibles)`,'err');return;}
    const {assigns,shortfall}=autoWithdraw(t.id,item.qty);
    for(const a of assigns){
      orderLines.push({type_id:t.id,item_name:item.item_name,sku:item.sku,obra:item.obra||'',posId:a.posId,qty:a.qty,remaining:a.remaining});
    }
    if(shortfall>0){showMsg(`Faltante de ${shortfall} en ${item.item_name}`,'err');return;}
  }
  S.salidaOrder=orderLines;
  S.salidaScanned={};
  render();
}

  const lines=[...S.salidaOrder];
  if(S.salidaSort==='obra') lines.sort((a,b)=>a.obra.localeCompare(b.obra)||a.item_name.localeCompare(b.item_name));
  else if(S.salidaSort==='pos') lines.sort((a,b)=>a.posId.localeCompare(b.posId));
  else lines.sort((a,b)=>a.item_name.localeCompare(b.item_name)||a.posId.localeCompare(b.posId));

  const allDone=lines.every(l=>isScanned(l));

  let h=`<div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Orden de salida</span>
      <button class="btn btn-sm btn-dk" onclick="S.salidaOrder=null;render()">← Volver</button>
    </div>
    <div class="sort-row">
      <button class="sort-btn ${S.salidaSort==='obra'?'on':''}" onclick="sortOrder('obra')">Obra</button>
      <button class="sort-btn ${S.salidaSort==='pos'?'on':''}" onclick="sortOrder('pos')">Posición</button>
      <button class="sort-btn ${S.salidaSort==='art'?'on':''}" onclick="sortOrder('art')">Artículo</button>
    </div>`;

  for(const l of lines){
    const done=isScanned(l);
    h+=`<div class="scan-item ${done?'done':'pending'}">
      <div class="scan-check">${done?'✓':'○'}</div>
      <div style="flex:1;">
        <div style="font-size:12px;font-weight:600;color:#e0e0e0;">${esc(l.item_name)}</div>
        <div style="font-family:monospace;font-size:10px;color:#888;">${esc(l.posId)} · ${l.qty} ud · ${esc(l.obra)}</div>
      </div>
      ${!done?`<button class="btn btn-sm btn-dk" onclick="openScan('${esc(l.posId)}','${esc(l.sku)}')">QR</button>`:''}
    </div>`;
  }

  if(allDone){
    h+=`<button class="btn btn-grn" style="margin-top:12px;" onclick="completarSalida()">✓ Confirmar salida</button>`;
  }else{
    const done2=lines.filter(l=>isScanned(l)).length;
    h+=`<div style="font-family:monospace;font-size:11px;color:#666;text-align:center;margin-top:10px;">${done2}/${lines.length} confirmados</div>`;
  }
  h+=`</div>`;
  return h;
}

function scanKey(posId,sku){return `${posId}|${sku}`;}
function isScanned(l){return !!S.salidaScanned[scanKey(l.posId,l.sku)];}

let qrScanner=null;
function openScan(posId,sku){
  document.getElementById('modal-scan').style.display='flex';
  setTimeout(()=>{
    qrScanner=new Html5Qrcode('qr-reader');
    qrScanner.start({facingMode:'environment'},{fps:10,qrbox:200},(text)=>{
      if(text===sku){
        S.salidaScanned[scanKey(posId,sku)]=true;
        closeScan();
        render();
      }
    },(err)=>{}).catch(e=>console.error(e));
  },300);
}

function closeScan(){
  if(qrScanner){qrScanner.stop().catch(()=>{});qrScanner=null;}
  document.getElementById('modal-scan').style.display='none';
}

async function completarSalida(){
  try{
    // Group by type_id
    const byType={};
    for(const l of S.salidaOrder){
      if(!byType[l.type_id]) byType[l.type_id]=[];
      byType[l.type_id].push({posId:l.posId,qty:l.qty,remaining:l.remaining});
    }
    for(const [tid,assigns] of Object.entries(byType)){
      await api('POST','/api/baja',{tid:parseInt(tid),assigns});
    }
    S.salidaOrder=null;S.salidaItems=[];S.salidaScanned={};
    await loadAll();
    showMsg('Salida registrada','ok');
    nav('dash');
  }catch(e){showMsg(e.message,'err');}
}

// ═══════════════ HISTORIAL ═══════════════
function vHist(){
  if(!S.hist.length) return `<div class="empty"><div class="eico">🕰</div><p>Sin movimientos</p></div>`;
  let h=`<div class="card">`;
  for(const m of S.hist){
    const nm=tname(m.plate_type_id);
    const d=new Date(m.created_at);
    const ds=`${d.getDate()}/${d.getMonth()+1} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    h+=`<div class="hrow">
      <span class="htag ${m.movement_type==='ingreso'?'htin':'htout'}">${m.movement_type==='ingreso'?'IN':'OUT'}</span>
      <div class="hinfo">
        <div class="hinm">${esc(nm)}</div>
        <div class="hipos">${esc(m.position_id)}</div>
      </div>
      <div class="hqty">${m.movement_type==='ingreso'?'+':'−'}${m.quantity}</div>
      <div class="hdate">${ds}</div>
    </div>`;
  }
  h+=`</div>`;
  return h;
}

// ═══════════════ CONFIG ═══════════════
function openConfig(){
  const body=document.getElementById('config-body');
  let h='';
  for(const p of [...S.positions].sort((a,b)=>a.id.localeCompare(b.id))){
    h+=`<div class="pos-cfg-row">
      <span class="pos-cfg-id">${esc(p.id)}</span>
      <input class="pos-cfg-input" type="number" min="1" value="${p.capacity}"
        data-pos="${esc(p.id)}" oninput="S.cfgEdits[this.dataset.pos]=+this.value">
      <span style="font-family:monospace;font-size:10px;color:#666;">cap</span>
    </div>`;
  }
  body.innerHTML=h;
  document.getElementById('modal-config').style.display='flex';
}

function closeConfig(){document.getElementById('modal-config').style.display='none';S.cfgEdits={};}

async function saveConfig(){
  const entries=Object.entries(S.cfgEdits);
  if(!entries.length){closeConfig();return;}
  try{
    for(const [posId,capacity] of entries){
      await api('PUT','/api/config',{posId,capacity});
    }
    await loadAll();
    closeConfig();
    showMsg('Capacidades guardadas','ok');
  }catch(e){showMsg(e.message,'err');}
}

// ═══════════════ LABELS ═══════════════
function openLabels(){
  if(!S.labelsData||!S.labelsData.length) return;
  const body=document.getElementById('labels-body');
  body.innerHTML='';
  for(const item of S.labelsData){
    for(let i=0;i<item.qty;i++){
      const wrap=document.createElement('div');
      wrap.className='label-card';
      const qrDiv=document.createElement('div');
      qrDiv.className='label-qr';
      wrap.appendChild(qrDiv);
      const nm=document.createElement('div');
      nm.className='label-name';
      nm.textContent=item.name.toUpperCase();
      wrap.appendChild(nm);
      const sku=document.createElement('div');
      sku.className='label-sku';
      sku.textContent=item.sku||'';
      wrap.appendChild(sku);
      body.appendChild(wrap);
      if(item.sku){
        new QRCode(qrDiv,{text:item.sku,width:70,height:70,colorDark:'#000000',colorLight:'#ffffff'});
      }
    }
  }
  document.getElementById('modal-labels').style.display='flex';
}

function closeLabels(){document.getElementById('modal-labels').style.display='none';}

function printLabels(){
  // Force print media
  window.print();
}

// ═══════════════ INIT ═══════════════
loadAll();
</script>
</body>
